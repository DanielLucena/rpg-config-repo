server.port=${EUREKA_SERVER_PORT:8761}

eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.instance-id=${EUREKA_INSTANCE_ID:${spring.application.name}:${server.port}}
eureka.client.register-with-eureka=${EUREKA_REGISTER_WITH_EUREKA:false}
eureka.client.fetch-registry=${EUREKA_FETCH_REGISTRY:false}
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://${eureka.instance.hostname}:${server.port}/eureka/}
eureka.server.default-open-for-traffic-count=0
eureka.server.wait-time-in-ms-when-sync-empty=0
spring.cloud.service-registry.auto-registration.enabled=false
spring.cloud.service-registry.auto-registration.enabled=${EUREKA_AUTO_REGISTRATION:false}
eureka.client.registry-fetch-interval-seconds=1

management.endpoints.web.exposure.include=health,info,metrics,prometheus
spring.cloud.refresh.enabled=false
