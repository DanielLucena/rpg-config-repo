spring.application.name=rpg-event-service
server.port=8081

client.rules-service.url=http://rpg-rules-function
client.graphql.url=http://rpg-narrative-service/graphql
app.clients.rules=remote
app.clients.narration=remote

eureka.client.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://peer1:8761/eureka/,http://peer2:8762/eureka/

eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

eureka.instance.lease-renewal-interval-in-seconds=5
eureka.instance.lease-expiration-duration-in-seconds=15
eureka.client.registry-fetch-interval-seconds=5

management.endpoints.web.exposure.include=health,info,metrics
