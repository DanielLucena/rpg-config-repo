server.port=${EUREKA_SERVER_PORT:8762}

eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.instance-id=${spring.application.name}:peer2:${server.port}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
spring.cloud.service-registry.auto-registration.enabled=true
eureka.client.registry-fetch-interval-seconds=1